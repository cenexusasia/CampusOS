# =============================================================================
# CampusOS — Docker Compose Development Environment
# =============================================================================

services:
  # ---- PostgreSQL 16 + pgvector -----------------------------------------------
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: campusos-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campusos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campusos}
      POSTGRES_DB: ${POSTGRES_DB:-campusos}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-campusos} -d ${POSTGRES_DB:-campusos}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - campusos-network

  # ---- Redis 7 ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: campusos-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - campusos-network
    profiles:
      - full

  # ---- MinIO (S3-Compatible Object Storage) -----------------------------------
  minio:
    image: minio/minio:latest
    container_name: campusos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - campusos-network

  # ---- Mailpit (Dev Email Testing) --------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: campusos-mailpit
    restart: unless-stopped
    ports:
      - '${SMTP_PORT:-1025}:1025'
      - '${MAILPIT_WEB_PORT:-8025}:8025'
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATA_FILE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8025/api/v1/info']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - campusos-network

# ---- Volumes ---------------------------------------------------------------
volumes:
  postgres_data:
    name: campusos-postgres-data
    driver: local
  redis_data:
    name: campusos-redis-data
    driver: local
  minio_data:
    name: campusos-minio-data
    driver: local
  mailpit_data:
    name: campusos-mailpit-data
    driver: local

# ---- Network ----------------------------------------------------------------
networks:
  campusos-network:
    name: campusos-network
    driver: bridge
