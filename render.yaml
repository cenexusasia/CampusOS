services:
  - type: web
    name: campusos-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd ../.. && corepack enable && pnpm install --frozen-lockfile && cd apps/api && npx prisma generate && cd ../.. && pnpm build --filter=@campusos/api
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 4000
      - key: API_GLOBAL_PREFIX
        value: api/v1
      - key: NEXT_PUBLIC_APP_URL
        value: https://campusos-nu.vercel.app
